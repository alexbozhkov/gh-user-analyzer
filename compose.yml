services:
  backend:
    container_name: github_analyzer_backend
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DEPLOY_ENV: dev
      DEBUG: "True"
    volumes:
      - ./backend:/app
    stdin_open: true
    tty: true

  frontend:
    container_name: github_analyzer_frontend
    build:
      context: ./frontend
    ports:
      - "4200:4200"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm start"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
